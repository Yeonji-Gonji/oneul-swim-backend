# 오늘수영 백엔드 프로덕션 구성 (VPS 1대)
# 사용: .env에 POSTGRES_PASSWORD, API_DOMAIN, CORS_ORIGINS 정의 후
#   docker compose up -d
services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      API_DOMAIN: ${API_DOMAIN}
    depends_on:
      - api

  api:
    # 서버는 GHCR 이미지를 pull 해서 뜬다(CD). 로컬은 build 로 직접 빌드.
    image: ghcr.io/yeonji-gonji/oneul-swim-backend:latest
    build: .
    restart: unless-stopped
    ports:
      - '5555:5555'
    environment:
      DATABASE_URL: postgresql://oneul:${POSTGRES_PASSWORD}@db:5432/oneul_swim
      CORS_ORIGINS: ${CORS_ORIGINS}
      PORT: '3000'
      ADMIN_TOKEN: ${ADMIN_TOKEN}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_SUBJECT: ${VAPID_SUBJECT}
      KAKAO_REST_KEY: ${KAKAO_REST_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    # 서버 안(localhost)에서만 접근 가능 — GUI 툴은 SSH 터널로 접속.
    # 외부 인터넷에는 열리지 않는다 (0.0.0.0 아님)
    ports:
      - '127.0.0.1:5432:5432'
    environment:
      POSTGRES_USER: oneul
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: oneul_swim
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U oneul -d oneul_swim']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  caddy_data:
  caddy_config:
  pgdata:

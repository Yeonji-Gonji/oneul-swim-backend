# 오늘수영 백엔드 프로덕션 구성 (VPS 1대)
# 사용: .env에 POSTGRES_PASSWORD, API_DOMAIN, CORS_ORIGINS 정의 후
#   docker compose up -d
services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      API_DOMAIN: ${API_DOMAIN}
    depends_on:
      - api

  api:
    build: .
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://oneul:${POSTGRES_PASSWORD}@db:5432/oneul_swim
      CORS_ORIGINS: ${CORS_ORIGINS}
      PORT: '3000'
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: oneul
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: oneul_swim
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U oneul -d oneul_swim']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  caddy_data:
  caddy_config:
  pgdata:
